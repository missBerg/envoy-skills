name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        eg-version: ["v1.7.0"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kind cluster
        uses: helm/kind-action@v1
        with:
          config: tests/kind-config.yaml
          cluster_name: envoy-skills-test

      - name: Install Envoy Gateway
        run: |
          helm install eg oci://docker.io/envoyproxy/gateway-helm \
            --version ${{ matrix.eg-version }} \
            -n envoy-gateway-system \
            --create-namespace \
            --wait --timeout 5m

          kubectl wait --timeout=5m -n envoy-gateway-system \
            deployment/envoy-gateway --for=condition=Available

          kubectl apply -f - <<EOF
          apiVersion: gateway.networking.k8s.io/v1
          kind: GatewayClass
          metadata:
            name: eg
          spec:
            controllerName: gateway.envoyproxy.io/gatewayclass-controller
          EOF

      - name: Deploy test backend
        run: |
          kubectl create deployment test-backend --image=nginx:1.27 --port=80
          kubectl expose deployment test-backend --port=80
          kubectl wait --timeout=120s deployment/test-backend --for=condition=Available

      - name: Create test Gateway and HTTPRoute
        run: |
          kubectl apply -f - <<EOF
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: test-gateway
            namespace: default
          spec:
            gatewayClassName: eg
            listeners:
              - name: http
                protocol: HTTP
                port: 80
                allowedRoutes:
                  namespaces:
                    from: Same
          EOF

          kubectl apply -f - <<EOF
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: test-route
            namespace: default
          spec:
            parentRefs:
              - name: test-gateway
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: test-backend
                    port: 80
          EOF

      - name: Wait for Gateway to be Programmed
        run: |
          echo "Waiting for test-gateway to be Programmed (timeout: 120s)..."
          ELAPSED=0
          TIMEOUT=120
          while [[ $ELAPSED -lt $TIMEOUT ]]; do
            STATUS="$(kubectl get gateway test-gateway -n default \
              -o jsonpath='{.status.conditions[?(@.type=="Programmed")].status}' 2>/dev/null || echo "")"
            if [[ "$STATUS" == "True" ]]; then
              echo "Gateway is Programmed."
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
            echo "  Waiting... (${ELAPSED}s/${TIMEOUT}s)"
          done
          echo "Warning: Gateway not yet Programmed after ${TIMEOUT}s"
          kubectl get gateway -n default -o wide || true
          kubectl get pods -n envoy-gateway-system || true

      - name: Run core E2E tests
        run: tests/e2e/test-core.sh

      - name: Run policy E2E tests
        run: tests/e2e/test-policies.sh

      - name: Run dry-run validation
        run: tests/e2e/test-dry-run.sh
